<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f10;
      --surface:  #17171a;
      --border:   #2a2a2f;
      --accent:   #7c6ef7;
      --accent2:  #a78bfa;
      --text:     #e8e8ed;
      --muted:    #6b6b7a;
      --user-bg:  #1e1e26;
      --ai-bg:    #141418;
      --radius:   10px;
      --font:     'Cascadia Code', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.65;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 18px 14px;
      gap: 6px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    .sidebar-logo span {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 12.5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-align: left;
    }

    .new-chat-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(124,110,247,0.06);
    }

    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 10px 4px;
    }

    .history-list { flex: 1; overflow-y: auto; }

    .history-item {
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.12s, background 0.12s;
    }

    .history-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .history-item.active { color: var(--accent2); background: rgba(124,110,247,0.1); }

    .sidebar-footer {
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .sidebar-footer a {
      color: var(--accent2);
      text-decoration: none;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .model-badge span.pill {
      background: rgba(124,110,247,0.12);
      border: 1px solid rgba(124,110,247,0.3);
      color: var(--accent2);
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d399;
      display: inline-block;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      padding: 10px 24px;
      gap: 14px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 7px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    .avatar.user {
      background: rgba(124,110,247,0.18);
      border: 1px solid rgba(124,110,247,0.3);
      color: var(--accent2);
    }

    .avatar.ai {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-role {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .message-text {
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-text code {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--font);
      font-size: 13px;
    }

    .message-text pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .message-text pre code {
      background: none;
      border: none;
      padding: 0;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .welcome-title span { color: var(--accent2); }

    .welcome-sub {
      font-size: 13px;
      max-width: 380px;
      line-height: 1.7;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 6px;
      max-width: 520px;
    }

    .suggestion-chip {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion-chip:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(124,110,247,0.06);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* Error message */
    .error-msg {
      color: #f87171;
      font-size: 12.5px;
      padding: 8px 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(124,110,247,0.5);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      line-height: 1.5;
      min-height: 22px;
      max-height: 180px;
      overflow-y: auto;
    }

    #userInput::placeholder { color: var(--muted); }
    #userInput::-webkit-scrollbar { width: 0; }

    .send-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    .send-btn:hover { background: var(--accent2); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { pointer-events: none; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .message-row { padding: 8px 14px; }
      .input-area { padding: 12px 14px 16px; }
      .topbar { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-dot"></div>
      <span>AI Chat</span>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>

    <div class="sidebar-label">Recent</div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="model-badge">
        <span class="status-dot"></span>
        Model
        <span class="pill">llama-3.3-70b-versatile</span>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-title">Hello. I'm your <span>AI Assistant</span>.</div>
        <div class="welcome-sub">Ask me anything.</div>
        <div class="suggestions">
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Write a Python script</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Summarize a topic</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Help me brainstorm ideas</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          rows="1"
          placeholder="Ask something..."
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>

  </div>
</div>

<script>
  let history = [];
  let sessions = [];
  let currentSessionId = null;
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const welcome    = document.getElementById('welcome');
  const historyList = document.getElementById('historyList');

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) sendMessage();
    }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function newChat() {
    if (history.length > 0) {
      // Save session
      const label = history[0].content.slice(0, 36) + (history[0].content.length > 36 ? '…' : '');
      sessions.unshift({ id: Date.now(), label, history: [...history] });
      renderHistory();
    }
    history = [];
    currentSessionId = null;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcome);
    welcome.style.display = 'flex';
  }

  function loadSession(id) {
    const s = sessions.find(x => x.id === id);
    if (!s) return;
    history = [...s.history];
    currentSessionId = id;
    messagesEl.innerHTML = '';
    history.forEach(msg => appendMessage(msg.role, msg.content));
    document.querySelectorAll('.history-item').forEach(el =>
      el.classList.toggle('active', parseInt(el.dataset.id) === id));
  }

  function renderHistory() {
    historyList.innerHTML = '';
    sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
      div.dataset.id = s.id;
      div.textContent = s.label;
      div.onclick = () => loadSession(s.id);
      historyList.appendChild(div);
    });
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Hide welcome
    welcome.style.display = 'none';

    inputEl.value = '';
    inputEl.style.height = 'auto';

    history.push({ role: 'user', content: text });
    appendMessage('user', text);

    const typingRow = appendTyping();
    setLoading(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      const data = await res.json();
      typingRow.remove();

      if (data.error) {
        appendMessage('ai', null, data.error);
        history.pop(); // remove user msg on error
      } else {
        history.push({ role: 'assistant', content: data.response });
        appendMessage('ai', data.response);
      }
    } catch (err) {
      typingRow.remove();
      appendMessage('ai', null, 'Network error. Please try again.');
      history.pop();
    }

    setLoading(false);
    scrollToBottom();
  }

  function appendMessage(role, content, error = null) {
    const row = document.createElement('div');
    row.className = 'message-row';

    const isUser = role === 'user';
    const label  = isUser ? 'You' : 'Llama';
    const abbr   = isUser ? 'U' : 'AI';

    row.innerHTML = `
      <div class="avatar ${isUser ? 'user' : 'ai'}">${abbr}</div>
      <div class="message-content">
        <div class="message-role">${label}</div>
        ${error
          ? `<div class="error-msg">${escapeHtml(error)}</div>`
          : `<div class="message-text">${formatText(content)}</div>`
        }
      </div>
    `;
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'message-row';
    row.innerHTML = `
      <div class="avatar ai">AI</div>
      <div class="message-content">
        <div class="message-role">Llama</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function setLoading(state) {
    isLoading = state;
    sendBtn.disabled = state;
    inputEl.disabled = state;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(text) {
    if (!text) return '';
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    // Inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Escape remaining HTML (but not our tags)
    // Already safe since we only built known tags above
    return text;
  }
</script>
</body>
</html>
